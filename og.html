<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif}
.og{width:1200px;height:630px;position:relative;background:radial-gradient(ellipse at 30% 20%,#0c1f17 0%,#08120d 45%,#060b08 100%);display:flex;flex-direction:column;justify-content:center;padding:0 90px;color:#fff}
.icon{font-size:120px;line-height:1;margin-bottom:14px;filter:drop-shadow(0 0 50px rgba(52,211,153,0.6))}
h1{font-size:120px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:14px}
h1 .a{color:#fff}h1 .b{background:linear-gradient(120deg,#34d399,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:40px;font-weight:600;color:rgba(255,255,255,0.82);margin-bottom:24px}
.tag{font-size:29px;font-style:italic;color:#34d399;border-left:5px solid rgba(52,211,153,0.5);padding-left:22px;max-width:920px;line-height:1.35}
.foot{position:absolute;bottom:46px;left:90px;right:90px;display:flex;justify-content:space-between;align-items:center}
.url{font-family:'JetBrains Mono',monospace;font-size:26px;color:#67e8f9}.brand{font-family:'JetBrains Mono',monospace;font-size:24px;color:#ffd700}
.stack{position:absolute;top:58px;right:90px;font-family:'JetBrains Mono',monospace;font-size:20px;color:rgba(255,255,255,0.45);text-align:right}
</style></head><body><div class="og">
<div class="stack">19 sovereign skills</div>
<div class="icon">🧩</div><h1><span class="a">SK</span><span class="b">Skills</span></h1>
<div class="sub">Sovereign Skills for Any AI Agent</div>
<div class="tag">"Install, approve, template — your standard build"</div>
<div class="foot"><span class="url">skskills.skworld.io</span><span class="brand">🐧 SKWorld</span></div>
</div></body></html>
